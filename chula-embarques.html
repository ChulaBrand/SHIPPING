<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green-dark: #1B3A2D;
    --green-mid: #7EC845;
    --purple: #5B21B6;
    --bg: #F7F5F0;
    --white: #ffffff;
    --text: #1a1a1a;
    --text-muted: #6b7280;
    --text-faint: #9ca3af;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --radius: 12px;
    --radius-sm: 8px;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem 4rem; }
  .container { width: 100%; max-width: 420px; }
  .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 2.5rem; }
  .logo-mark { width: 36px; height: 36px; background: var(--purple); border-radius: 9px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .logo-mark svg { width: 36px; height: 36px; }
  .logo-text { font-size: 13px; font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-muted); }
  .logo-text span { color: var(--text); }
  .screen { display: none; }
  .screen.active { display: block; }
  .page-title { font-size: 24px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .page-sub { font-size: 15px; color: var(--text-muted); margin-bottom: 2rem; }
  .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .role-btn { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem 1rem 1.25rem; cursor: pointer; text-align: center; transition: border-color 0.15s, transform 0.1s; }
  .role-btn:hover { border-color: var(--border-strong); }
  .role-btn:active { transform: scale(0.97); }
  .role-icon { font-size: 30px; color: var(--text-muted); margin-bottom: 10px; display: block; }
  .role-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .role-desc { font-size: 12px; color: var(--text-faint); line-height: 1.4; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .top-bar-title { font-size: 17px; font-weight: 600; color: var(--text); }
  .btn-back { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; color: var(--text-muted); cursor: pointer; padding: 5px 12px; font-family: 'Inter', sans-serif; }
  .btn-back:hover { background: rgba(0,0,0,0.04); }
  .pin-wrap { max-width: 280px; margin: 0 auto; text-align: center; padding-top: 0.5rem; }
  .pin-title { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .pin-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 1.75rem; }
  .pin-dots { display: flex; justify-content: center; gap: 14px; margin-bottom: 1.75rem; }
  .pin-dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--border-strong); background: var(--bg); transition: all 0.15s; }
  .pin-dot.filled { background: var(--green-dark); border-color: var(--green-dark); }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .pkey { height: 54px; font-size: 20px; font-weight: 500; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; color: var(--text); font-family: 'Inter', sans-serif; transition: background 0.1s, transform 0.1s; }
  .pkey:active { background: var(--bg); transform: scale(0.95); }
  .pkey.del { font-size: 16px; color: var(--text-muted); }
  .pin-error { font-size: 13px; color: #dc2626; min-height: 20px; margin-bottom: 10px; }
  .inp { font-family: 'IBM Plex Mono', monospace; font-size: 16px; width: 100%; padding: 0 14px; height: 48px; background: var(--white); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); outline: none; margin-bottom: 10px; transition: border-color 0.15s; }
  .inp:focus { border-color: var(--green-dark); }
  .inp-sm { font-family: 'IBM Plex Mono', monospace; font-size: 13px; flex: 1; padding: 0 11px; height: 42px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); outline: none; min-width: 0; }
  .inp-sm.txt { font-family: 'Inter', sans-serif; }
  .btn-primary { width: 100%; height: 48px; font-size: 15px; font-weight: 600; background: var(--green-dark); color: #fff; border: none; border-radius: var(--radius-sm); cursor: pointer; font-family: 'Inter', sans-serif; }
  .btn-primary:active { transform: scale(0.98); }
  /* order cards */
  .order-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
  .order-card.highlight { border: 2px solid var(--green-dark); }
  .order-num { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-faint); margin-bottom: 2px; }
  .order-cliente { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .order-producto-lbl { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
  .highlight-badge { display: inline-block; font-size: 10px; font-weight: 600; background: var(--green-dark); color: #fff; border-radius: 99px; padding: 2px 8px; margin-left: 6px; vertical-align: middle; }
  .producto-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 1rem; }
  .producto-row i { font-size: 15px; color: var(--text-faint); }
  .producto-row span { font-size: 13px; color: var(--text); font-weight: 500; }
  /* tracker */
  .track-steps { display: flex; align-items: center; margin-bottom: 6px; }
  .step { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
  .step-dot { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border-strong); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 12px; z-index: 1; color: var(--text-faint); transition: all 0.2s; }
  .step-dot.done { background: var(--green-dark); border-color: var(--green-dark); color: #fff; }
  .step-dot.s1 { background: #DBEAFE; border-color: #93C5FD; color: #1E40AF; }
  .step-dot.s2 { background: #FEF9C3; border-color: #FDE047; color: #854D0E; }
  .step-dot.s3 { background: #FAEEDA; border-color: #EF9F27; color: #854F0B; }
  .step-dot.s4 { background: #EAF3DE; border-color: #97C459; color: #3B6D11; }
  .step-dot.s5 { background: #EDE9FE; border-color: #A78BFA; color: #5B21B6; }
  .step-line { position: absolute; top: 13px; left: calc(50% + 13px); right: calc(-50% + 13px); height: 2px; background: var(--border-strong); z-index: 0; transition: background 0.2s; }
  .step-line.done { background: var(--green-dark); }
  .step:last-child .step-line { display: none; }
  .step-labels { display: flex; margin-bottom: 8px; }
  .step-label { flex: 1; text-align: center; font-size: 9px; color: var(--text-faint); padding: 0 1px; line-height: 1.3; }
  .step-label.active { color: var(--text); font-weight: 600; }
  /* status badge shown on chofer view */
  .status-banner { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); margin-bottom: 1rem; }
  .status-banner-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .status-banner-label { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .status-banner-desc { font-size: 12px; line-height: 1.4; opacity: 0.85; }
  .sb-1 { background: #DBEAFE; color: #1E40AF; }
  .sb-2 { background: #FEF9C3; color: #854D0E; }
  .sb-3 { background: #FAEEDA; color: #854F0B; }
  .sb-4 { background: #EAF3DE; color: #3B6D11; }
  .sb-5 { background: #EDE9FE; color: #5B21B6; }
  .meta-row { display: flex; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 0.25rem; }
  .meta-label { font-size: 12px; color: var(--text-faint); }
  .meta-val { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .error-msg { font-size: 13px; color: #dc2626; margin: 10px 0 0; display: none; }
  /* clerk */
  .section-label { font-size: 11px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 10px; }
  .search-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1.5rem; display: flex; gap: 8px; }
  .orders-list { display: flex; flex-direction: column; gap: 10px; }
  .order-header { margin-bottom: 10px; }
  /* 5 status buttons — wrap into 3+2 */
  .status-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px; }
  .status-btns .sbtn:nth-child(4) { grid-column: 1 / 2; }
  .status-btns .sbtn:nth-child(5) { grid-column: 2 / 3; }
  .sbtn { height: 40px; font-size: 11px; font-weight: 500; border: 2px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; background: var(--bg); color: var(--text-muted); font-family: 'Inter', sans-serif; transition: background 0.1s, border-color 0.1s; line-height: 1.2; padding: 0 4px; }
  .sbtn:active { transform: scale(0.97); }
  .sbtn.sel-1 { background: #DBEAFE; color: #1E40AF; border-color: #93C5FD; font-weight: 600; }
  .sbtn.sel-2 { background: #FEF9C3; color: #854D0E; border-color: #FDE047; font-weight: 600; }
  .sbtn.sel-3 { background: #FAEEDA; color: #854F0B; border-color: #EF9F27; font-weight: 600; }
  .sbtn.sel-4 { background: #EAF3DE; color: #3B6D11; border-color: #97C459; font-weight: 600; }
  .sbtn.sel-5 { background: #EDE9FE; color: #5B21B6; border-color: #A78BFA; font-weight: 600; }
  .status-desc-lbl { font-size: 11px; color: var(--text-faint); font-style: italic; text-align: center; min-height: 16px; }
  .client-header { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
  .client-header i { font-size: 18px; color: var(--text-muted); }
  .client-header-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .client-header-sub { font-size: 12px; color: var(--text-faint); }
  .results-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .empty-state { text-align: center; padding: 2.5rem 0; color: var(--text-faint); font-size: 14px; line-height: 2; }
  .empty-state i { font-size: 28px; display: block; margin-bottom: 6px; }
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--green-dark); color: #fff; font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: 99px; transition: transform 0.3s; white-space: nowrap; z-index: 99; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: -3px; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-search-sm { height: 42px; padding: 0 16px; font-size: 13px; font-weight: 600; background: var(--green-dark); color: #fff; border: none; border-radius: var(--radius-sm); cursor: pointer; white-space: nowrap; font-family: 'Inter', sans-serif; }
</style>
</head>
<body>
<div class="container">
  <div class="logo-row">
    <div class="logo-mark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
        <rect width="64" height="64" rx="14" fill="#5B21B6"/>
        <ellipse cx="32" cy="37" rx="13" ry="17" fill="#F97316"/>
        <ellipse cx="32" cy="20" rx="4" ry="3" fill="#16A34A"/>
        <rect x="30" y="15" width="4" height="7" rx="2" fill="#16A34A"/>
        <ellipse cx="29" cy="35" rx="2" ry="2.5" fill="#7C2D12" opacity="0.7"/>
        <ellipse cx="35" cy="35" rx="2" ry="2.5" fill="#7C2D12" opacity="0.7"/>
        <ellipse cx="32" cy="40" rx="2" ry="2.5" fill="#7C2D12" opacity="0.7"/>
        <ellipse cx="29" cy="45" rx="2" ry="2.5" fill="#7C2D12" opacity="0.7"/>
        <ellipse cx="35" cy="45" rx="2" ry="2.5" fill="#7C2D12" opacity="0.7"/>
      </svg>
    </div>
    <span class="logo-text">Chula Brand — <span>Embarques</span></span>
  </div>

  <!-- ROL -->
  <div class="screen active" id="screen-rol">
    <p class="page-title">Welcome</p>
    <p class="page-sub">How are you accessing today?</p>
    <div class="role-grid">
      <div class="role-btn" onclick="goChofer()">
        <i class="ti ti-truck role-icon"></i>
        <p class="role-title">Driver / Client</p>
        <p class="role-desc">Check order status</p>
      </div>
      <div class="role-btn" onclick="goPin()">
        <i class="ti ti-clipboard-list role-icon"></i>
        <p class="role-title">Shipping Clerk</p>
        <p class="role-desc">Update orders</p>
      </div>
    </div>
  </div>

  <!-- PIN -->
  <div class="screen" id="screen-pin">
    <div class="top-bar"><span></span><button class="btn-back" onclick="goRol()">← Back</button></div>
    <div class="pin-wrap">
      <p class="pin-title">Clerk access</p>
      <p class="pin-sub">Enter your 4-digit PIN</p>
      <div class="pin-dots">
        <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
      </div>
      <div class="pin-pad">
        <button class="pkey" onclick="pinKey('1')">1</button><button class="pkey" onclick="pinKey('2')">2</button><button class="pkey" onclick="pinKey('3')">3</button>
        <button class="pkey" onclick="pinKey('4')">4</button><button class="pkey" onclick="pinKey('5')">5</button><button class="pkey" onclick="pinKey('6')">6</button>
        <button class="pkey" onclick="pinKey('7')">7</button><button class="pkey" onclick="pinKey('8')">8</button><button class="pkey" onclick="pinKey('9')">9</button>
        <button class="pkey" onclick="pinKey('')"></button><button class="pkey" onclick="pinKey('0')">0</button>
        <button class="pkey del" onclick="pinDel()"><i class="ti ti-backspace"></i></button>
      </div>
      <p class="pin-error" id="pin-error">Incorrect PIN. Try again.</p>
    </div>
  </div>

  <!-- CHOFER -->
  <div class="screen" id="screen-chofer">
    <div class="top-bar">
      <p class="top-bar-title">Check order</p>
      <button class="btn-back" onclick="goRol()">← Back</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <input class="inp" id="orden-input" type="text" placeholder="Order number (e.g. 100423)" maxlength="20" style="margin-bottom:0;flex:1;" />
      <button class="btn-primary" id="btn-buscar" onclick="buscar()" style="width:auto;padding:0 18px;white-space:nowrap;">Search</button>
    </div>
    <p class="error-msg" id="error-msg"><i class="ti ti-alert-circle"></i> Order not found. Double-check the number.</p>
    <div class="results-list" id="results-list"></div>
  </div>

  <!-- ENCARGADO -->
  <div class="screen" id="screen-enc">
    <div class="top-bar">
      <p class="top-bar-title">Shipping panel</p>
      <button class="btn-back" onclick="goRol()">Sign out</button>
    </div>
    <p class="section-label">Find order</p>
    <div class="search-card">
      <input class="inp-sm txt" id="enc-search" type="text" placeholder="Order # or customer name" maxlength="40" />
      <button class="btn-search-sm" onclick="encBuscar()">Search</button>
    </div>
    <p class="section-label">Today's orders</p>
    <div class="orders-list" id="orders-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwJ8viClBTNp-fOnZ4mYlwDobAWSdKX1rD05E3OIN-y9yIXXBLVeeRbuMo5hYJssI_cuQ/exec";
const PIN = "1234";
let pinVal = "";
let ordenes = [];
let choferOrdenes = [];

const LABELS = ["Processing","Ready","Waiting for dock","Loading","Departed"];
const DESCS  = [
  "Order received, being prepared",
  "Order is ready, waiting for driver",
  "Driver arrived, waiting for an available dock",
  "Truck is at the dock, loading in progress",
  "Truck has left the facility"
];
const ICONS  = ["ti-loader","ti-circle-check","ti-road","ti-forklift","ti-truck"];
const SEL    = ["sel-1","sel-2","sel-3","sel-4","sel-5"];
const DOT_CLS= ["s1","s2","s3","s4","s5"];
const BANNER_CLS = ["sb-1","sb-2","sb-3","sb-4","sb-5"];
const BANNER_ICONS = ["🕐","✅","🚧","📦","🚛"];

function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goRol() { pinVal=""; updateDots(); show('screen-rol'); }
function goChofer() {
  document.getElementById('error-msg').style.display='none';
  document.getElementById('results-list').innerHTML='';
  document.getElementById('orden-input').value='';
  loadChoferData();
  show('screen-chofer');
}
function goPin() { pinVal=""; updateDots(); document.getElementById('pin-error').style.display='none'; show('screen-pin'); }

function updateDots() { for(let i=0;i<4;i++) document.getElementById('pd'+i).className='pin-dot'+(i<pinVal.length?' filled':''); }
function pinKey(k) {
  if(!k||pinVal.length>=4) return;
  pinVal+=k; updateDots();
  if(pinVal.length===4) setTimeout(()=>{
    if(pinVal===PIN){ show('screen-enc'); loadOrdenes(); }
    else { document.getElementById('pin-error').style.display='block'; pinVal=""; updateDots(); }
  },200);
}
function pinDel() { pinVal=pinVal.slice(0,-1); updateDots(); }

async function loadChoferData() {
  try {
    const res = await fetch(`${API}?action=getAll&pin=${PIN}`);
    choferOrdenes = await res.json();
  } catch(e) { choferOrdenes = []; }
}

function buildTracker(est) {
  const steps = ICONS.map((icon,i) => {
    let dotClass = 'step-dot';
    if(i+1 < est) dotClass += ' done';
    else if(i+1 === est) dotClass += ' '+DOT_CLS[i];
    const lineClass = 'step-line'+(i+1 < est?' done':'');
    return `<div class="step">
      <div class="${dotClass}"><i class="ti ${icon}"></i></div>
      ${i<4?`<div class="${lineClass}"></div>`:''}
    </div>`;
  }).join('');
  const lbls = LABELS.map((l,i)=>`<span class="step-label${i+1===est?' active':''}">${l}</span>`).join('');
  return `<div class="track-steps">${steps}</div><div class="step-labels">${lbls}</div>`;
}

function renderDriverCard(o, highlighted) {
  const est = parseInt(o.estatus)||1;
  const banner = `<div class="status-banner ${BANNER_CLS[est-1]}">
    <span class="status-banner-icon">${BANNER_ICONS[est-1]}</span>
    <div><p class="status-banner-label">${LABELS[est-1]}</p><p class="status-banner-desc">${DESCS[est-1]}</p></div>
  </div>`;
  const prod = o.producto ? `<div class="producto-row"><i class="ti ti-box"></i><span>${o.producto}</span></div>` : '';
  return `<div class="order-card${highlighted?' highlight':''}">
    <p class="order-num" style="margin-bottom:4px;">Order #${o.orden}${highlighted?'<span class="highlight-badge">Your order</span>':''}</p>
    ${prod}
    ${banner}
    ${buildTracker(est)}
    <div class="meta-row"><span class="meta-label">Last updated</span><span class="meta-val">${o.hora||'—'}</span></div>
  </div>`;
}

async function buscar() {
  const val = document.getElementById('orden-input').value.trim();
  if(!val) return;
  const errEl = document.getElementById('error-msg');
  const list = document.getElementById('results-list');
  const btn = document.getElementById('btn-buscar');
  errEl.style.display='none'; list.innerHTML='';
  btn.innerHTML='<span class="spinner"></span>Searching...'; btn.disabled=true;
  try {
    const res = await fetch(`${API}?action=getOrder&orden=${encodeURIComponent(val)}`);
    const found = await res.json();
    btn.innerHTML='Search'; btn.disabled=false;
    if(found.error){ errEl.style.display='block'; return; }
    const clientOrders = choferOrdenes.filter(o => o.cliente === found.cliente);
    const toShow = clientOrders.length > 0 ? clientOrders : [found];
    let html = '';
    if(toShow.length > 1) {
      html += `<div class="client-header"><i class="ti ti-user"></i><div>
        <p class="client-header-name">${found.cliente}</p>
        <p class="client-header-sub">${toShow.length} orders today</p></div></div>`;
    }
    html += renderDriverCard(found, true);
    toShow.filter(o=>String(o.orden)!==String(found.orden)).forEach(o=>{ html+=renderDriverCard(o,false); });
    list.innerHTML = html;
  } catch(e) { btn.innerHTML='Search'; btn.disabled=false; errEl.textContent='Connection error. Try again.'; errEl.style.display='block'; }
}
document.getElementById('orden-input').addEventListener('keydown',e=>{ if(e.key==='Enter') buscar(); });

async function loadOrdenes() {
  const list = document.getElementById('orders-list');
  list.innerHTML='<div class="empty-state"><i class="ti ti-loader" style="animation:spin 1s linear infinite"></i>Loading...</div>';
  try {
    const res = await fetch(`${API}?action=getAll&pin=${PIN}`);
    ordenes = await res.json();
    renderOrdenes();
  } catch(e) { list.innerHTML='<div class="empty-state">Connection error</div>'; }
}

function buildClerkCard(o) {
  const est = parseInt(o.estatus)||1;
  return `<div class="order-card" id="card-${o.orden}">
    <div class="order-header">
      <p class="order-num">Order #${o.orden}</p>
      <p class="order-cliente">${o.cliente}</p>
      ${o.producto?`<p class="order-producto-lbl">${o.producto}</p>`:''}
    </div>
    <div class="status-btns">
      ${LABELS.map((l,i)=>`<button class="sbtn${est===i+1?' '+SEL[i]:''}" onclick="cambiarEstatus('${o.orden}',${i+1})">${l}</button>`).join('')}
    </div>
    <p class="status-desc-lbl" id="desc-${o.orden}">${DESCS[est-1]}</p>
  </div>`;
}

function renderOrdenes(list_id='orders-list', data=ordenes) {
  const list = document.getElementById(list_id);
  list.innerHTML='';
  if(!data.length){ list.innerHTML='<div class="empty-state"><i class="ti ti-inbox"></i>No orders yet</div>'; return; }
  data.forEach(o=>{ list.innerHTML += buildClerkCard(o); });
}

async function cambiarEstatus(orden, est) {
  const card = document.getElementById('card-'+orden);
  card.querySelectorAll('.sbtn').forEach((b,i)=>{ b.className='sbtn'+(i===est-1?' '+SEL[i]:''); });
  const descEl = document.getElementById('desc-'+orden);
  if(descEl) descEl.textContent = DESCS[est-1];
  const o = ordenes.find(x=>String(x.orden)===String(orden));
  if(o) o.estatus=est;
  showToast('Status updated ✓');
  try {
    await fetch(API, { method:'POST', body: JSON.stringify({ pin:PIN, action:'updateStatus', orden, estatus:est }) });
  } catch(e) { showToast('Sync error — check connection'); }
}

function encBuscar() {
  const val = document.getElementById('enc-search').value.trim().toLowerCase();
  if(!val){ renderOrdenes(); return; }
  const filtered = ordenes.filter(o=>String(o.orden).includes(val)||o.cliente.toLowerCase().includes(val));
  const list = document.getElementById('orders-list');
  list.innerHTML='';
  if(!filtered.length){ list.innerHTML='<div class="empty-state"><i class="ti ti-search-off"></i>No match found</div>'; return; }
  filtered.forEach(o=>{ list.innerHTML += buildClerkCard(o); });
}
document.getElementById('enc-search').addEventListener('keydown',e=>{ if(e.key==='Enter') encBuscar(); });

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
</script>
</body>
</html>
